<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Grupo Lotificadora</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <h1><i class="fas fa-home"></i> Grupo Lotificadora</h1>
                <span class="status">En línea</span>
            </div>
        </header>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="message-content">
                    <p>¡Hola! Bienvenido a Grupo Lotificadora. ¿En qué puedo ayudarte hoy?</p>
                </div>
                <span class="timestamp">Ahora</span>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator" style="display: none;">
            <span></span><span></span><span></span>
        </div>
        
        <div class="chat-input-area">
            <div class="input-controls">
                <button class="control-btn" id="recordBtn" title="Grabar audio">
                    <i class="fas fa-microphone"></i>
                </button>
                <button class="control-btn" id="stopRecordBtn" style="display: none;" title="Detener grabación">
                    <i class="fas fa-stop"></i>
                </button>
                <label class="control-btn" for="fileInput" title="Adjuntar archivo">
                    <i class="fas fa-paperclip"></i>
                </label>
                <input type="file" id="fileInput" accept="audio/*,.txt" style="display: none;">
            </div>
            
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="Escribe tu mensaje..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            
            <div class="recording-status" id="recordingStatus" style="display: none;">
                <span class="recording-dot"></span>
                <span>Grabando...</span>
                <span id="recordingTime">0:00</span>
            </div>
            
            <div class="attachment-preview" id="attachmentPreview" style="display: none;">
                <span id="attachmentName"></span>
                <button class="remove-attachment" id="removeAttachment">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
